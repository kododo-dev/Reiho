name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
          dotnet-quality: preview

      - name: Restore library
        run: dotnet restore src/Reiho.AspNetCore/Reiho.AspNetCore.csproj

      - name: Restore tests
        run: dotnet restore src/Reiho.AspNetCore.Tests/Reiho.AspNetCore.Tests.csproj

      - name: Build library (all TFMs)
        run: dotnet build src/Reiho.AspNetCore/Reiho.AspNetCore.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test src/Reiho.AspNetCore.Tests/Reiho.AspNetCore.Tests.csproj --no-restore --configuration Release --logger "console;verbosity=normal"
