name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore src/Reiho.slnx

      - name: Build
        run: dotnet build src/Reiho.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/Reiho.AspNetCore.Tests/Reiho.AspNetCore.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
